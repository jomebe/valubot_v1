<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valubot - 로그인 처리 중</title>
  <!-- Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Load static configuration defining window.VALUBOT_BACKEND_URL -->
  <script src="/config.js"></script>
  <style>
    :root {
      --bg-color: #0f1923;
      --card-bg: rgba(23, 34, 45, 0.65);
      --primary: #fd4556;
      --success: #00f0aa;
      --warning: #ffb000;
      --text: #ece8e1;
      --text-muted: #94a3b8;
      --border: rgba(236, 232, 225, 0.1);
      --border-active: rgba(253, 69, 86, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative background glowing spots */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(253, 69, 86, 0.12) 0%, rgba(15, 25, 35, 0) 70%);
      top: -5%;
      right: -5%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Status Icons */
    .status-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 28px;
      position: relative;
    }

    /* Loading Spinner */
    .spinner {
      border: 3.5px solid rgba(253, 69, 86, 0.15);
      border-top: 3.5px solid var(--primary);
      border-radius: 50%;
      width: 72px;
      height: 72px;
      animation: spin 1s linear infinite;
      margin: 0 auto 28px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Success Icon */
    .icon-success {
      background: rgba(0, 240, 170, 0.1);
      border: 1.5px solid var(--success);
      box-shadow: 0 0 20px rgba(0, 240, 170, 0.25);
    }
    .icon-success svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: var(--success);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Warning/Info Icon */
    .icon-warning {
      background: rgba(255, 176, 0, 0.1);
      border: 1.5px solid var(--warning);
      box-shadow: 0 0 20px rgba(255, 176, 0, 0.25);
    }
    .icon-warning svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: var(--warning);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Error Icon */
    .icon-error {
      background: rgba(253, 69, 86, 0.1);
      border: 1.5px solid var(--primary);
      box-shadow: 0 0 20px rgba(253, 69, 86, 0.25);
    }
    .icon-error svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: var(--primary);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .desc {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .playerName {
      display: inline-block;
      background: rgba(253, 69, 86, 0.08);
      border: 1px solid var(--border-active);
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 600;
      color: var(--primary);
      margin-top: 12px;
      font-size: 14px;
    }

    .error-details {
      text-align: left;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 32px;
      font-size: 13.5px;
      color: #929a94;
      line-height: 1.6;
      border-left: 3px solid var(--primary);
    }

    .error-details strong {
      color: var(--text);
      display: block;
      margin-bottom: 6px;
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      background-color: #5865F2;
      color: #ffffff;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      width: 100%;
      box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(88, 101, 242, 0.45);
      background-color: #4752c4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="card" class="card">
      <!-- Loading view -->
      <div id="view-loading">
        <div class="spinner"></div>
        <h1>로그인 연동 처리 중</h1>
        <p class="desc">Riot Sign-On 로그인 정보를 확인하고 디스코드 계정과 연동하는 중입니다. 잠시만 기다려 주세요...</p>
      </div>

      <!-- Success view -->
      <div id="view-success" style="display: none;">
        <div class="status-icon icon-success">
          <svg viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h1>로그인 완료!</h1>
        <p class="desc" id="success-desc">로그인 완료! 디스코드로 돌아가서 /상점 을 입력하세요.<br><span id="player-badge" class="playerName"></span></p>
      </div>

      <!-- Placeholder / Setup Required view -->
      <div id="view-placeholder" style="display: none;">
        <div class="status-icon icon-warning">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
        </div>
        <h1>인증 준비 완료</h1>
        <p class="desc">로그인 콜백 페이지가 준비되었습니다. 백엔드 연동 설정 후 자동 계정 연결이 활성화됩니다.</p>
        <button class="btn" onclick="window.close()">창 닫기</button>
      </div>

      <!-- Error view -->
      <div id="view-error" style="display: none;">
        <div class="status-icon icon-error">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </div>
        <h1 id="error-title">인증 오류</h1>
        <p class="desc" id="error-desc">로그인 처리 도중 문제가 발생했습니다.</p>
        <div class="error-details" id="error-troubleshoot" style="display: none;">
          <strong>오류 상세 및 해결 방법</strong>
          <span id="troubleshoot-text">설명</span>
        </div>
        <button class="btn" onclick="window.close()">창 닫기</button>
      </div>
    </div>
  </div>

  <script>
    const viewLoading = document.getElementById('view-loading');
    const viewSuccess = document.getElementById('view-success');
    const viewPlaceholder = document.getElementById('view-placeholder');
    const viewError = document.getElementById('view-error');
    
    const playerBadge = document.getElementById('player-badge');
    const errorTitle = document.getElementById('error-title');
    const errorDesc = document.getElementById('error-desc');
    const errorTroubleshoot = document.getElementById('error-troubleshoot');
    const troubleshootText = document.getElementById('troubleshoot-text');
    const card = document.getElementById('card');

    function showView(viewName) {
      viewLoading.style.display = viewName === 'loading' ? 'block' : 'none';
      viewSuccess.style.display = viewName === 'success' ? 'block' : 'none';
      viewPlaceholder.style.display = viewName === 'placeholder' ? 'block' : 'none';
      viewError.style.display = viewName === 'error' ? 'block' : 'none';
    }

    function showError(title, message, troubleshoot) {
      document.title = "Valubot - 인증 오류";
      errorTitle.innerText = title;
      errorDesc.innerText = message;
      if (troubleshoot) {
        errorTroubleshoot.style.display = 'block';
        troubleshootText.innerText = troubleshoot;
      } else {
        errorTroubleshoot.style.display = 'none';
      }
      card.style.borderColor = 'var(--primary)';
      showView('error');
    }

    function getParam(name) {
      // 1. Check query string
      const queryParams = new URLSearchParams(window.location.search);
      if (queryParams.get(name)) return queryParams.get(name);
      
      // 2. Check hash fragment
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      return hashParams.get(name);
    }

    async function processCallback() {
      // Parse parameters
      const accessToken = getParam('access_token') || getParam('accessToken');
      const idToken = getParam('id_token') || getParam('idToken');
      const code = getParam('code');
      const state = getParam('state');
      const errorCode = getParam('error');
      const errorDescription = getParam('error_description');

      // Clean up sensitive credentials from address bar immediately
      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      // 1. Check for Riot authentication errors
      if (errorCode) {
        showError(
          '라이엇 로그인 실패',
          `라이엇 서버 로그인 과정에서 에러가 발생했습니다: ${errorDescription || errorCode}`,
          '인증이 취소되었거나 라이엇 로그인 서버의 일시적인 문제일 수 있습니다. 디스코드에서 /로그인을 다시 시도해 주세요.'
        );
        return;
      }

      // 2. Check if state and credentials/code are present
      if (!state) {
        showError(
          '인증 정보 부족 (Missing State)',
          '보안 상태 정보(state)가 누락되어 계정 연동 처리를 진행할 수 없습니다.',
          '반드시 디스코드 채널에서 /로그인 명령어를 통해 정상적인 링크로 접속해 주세요.'
        );
        return;
      }

      if (!accessToken && !code) {
        showError(
          '로그인 정보 부족 (Missing Token/Code)',
          '라이엇 인증 서버로부터 유효한 인증 토큰 또는 인가 코드가 전달되지 않았습니다.',
          'Riot Sign-On 과정이 완료되지 않았습니다. 디스코드에서 다시 로그인을 실행해 주세요.'
        );
        return;
      }

      // 3. Check if backend URL config is in placeholder state
      const backendBaseUrl = window.VALUBOT_BACKEND_URL;
      if (!backendBaseUrl || backendBaseUrl.includes('YOUR_BACKEND_URL_HERE') || backendBaseUrl.includes('your-bot-backend.com')) {
        console.log('Backend config is in placeholder/maintenance mode.');
        showView('placeholder');
        return;
      }

      // 4. Send authorization data to backend
      const endpoint = `${backendBaseUrl}/api/auth/riot/callback`;

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            accessToken,
            idToken,
            code,
            state
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          document.title = "Valubot - 로그인 완료";
          playerBadge.innerText = data.playerName || '연결 완료';
          card.style.borderColor = 'var(--success)';
          showView('success');
        } else {
          const errorMsg = data.error || '알 수 없는 서버 인증 오류입니다.';
          showError('계정 연동 실패', errorMsg, '인증 세션이 만료(5분)되었거나 올바르지 않은 요청 상태입니다. 디스코드에서 다시 /로그인을 입력하여 시도해 주세요.');
        }
      } catch (err) {
        console.error('Connection failure:', err);
        // If connection fails, show the placeholder view nicely to satisfy app reviews
        showView('placeholder');
      }
    }

    processCallback();
  </script>
</body>
</html>
