<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valubot - 로그인 처리 중</title>
  <!-- Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Load static configuration defining window.VALUBOT_BACKEND_URL -->
  <script src="/config.js"></script>
  <style>
    :root {
      --bg-color: #0f1923;
      --card-bg: rgba(23, 34, 45, 0.65);
      --primary: #fd4556;
      --success: #00f0aa;
      --warning: #ffb000;
      --text: #ece8e1;
      --text-muted: #768079;
      --border: rgba(236, 232, 225, 0.1);
      --border-active: rgba(253, 69, 86, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative background glowing spots */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(253, 69, 86, 0.12) 0%, rgba(15, 25, 35, 0) 70%);
      top: -5%;
      right: -5%;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 240, 170, 0.08) 0%, rgba(15, 25, 35, 0) 70%);
      bottom: -5%;
      left: -5%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Status Icons */
    .status-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 28px;
      position: relative;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Loading Spinner */
    .spinner {
      border: 3.5px solid rgba(253, 69, 86, 0.15);
      border-top: 3.5px solid var(--primary);
      border-radius: 50%;
      width: 72px;
      height: 72px;
      animation: spin 1s linear infinite;
      margin: 0 auto 28px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Checkmark Icon (Success) */
    .icon-success {
      background: rgba(0, 240, 170, 0.1);
      border: 1.5px solid var(--success);
      box-shadow: 0 0 20px rgba(0, 240, 170, 0.25);
    }
    .icon-success svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: var(--success);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Warning/Error Icon */
    .icon-error {
      background: rgba(253, 69, 86, 0.1);
      border: 1.5px solid var(--primary);
      box-shadow: 0 0 20px rgba(253, 69, 86, 0.25);
    }
    .icon-error svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: var(--primary);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .desc {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 36px;
      transition: all 0.3s ease;
    }

    .playerName {
      display: inline-block;
      background: rgba(253, 69, 86, 0.08);
      border: 1px solid var(--border-active);
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 600;
      color: var(--primary);
      margin-top: 12px;
      font-size: 14px;
    }

    /* Instruction / Troubleshooting list */
    .error-details {
      text-align: left;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 32px;
      font-size: 13.5px;
      color: #929a94;
      line-height: 1.6;
      border-left: 3px solid var(--primary);
    }

    .error-details strong {
      color: var(--text);
      display: block;
      margin-bottom: 6px;
    }

    /* Discord Back Button */
    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      background-color: #5865F2; /* Discord color */
      color: #ffffff;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      width: 100%;
      box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(88, 101, 242, 0.45);
      background-color: #4752c4;
    }

    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="card" class="card">
      <!-- Dynamic views loaded by Javascript -->
      <div id="view-loading">
        <div class="spinner"></div>
        <h1>로그인 연동 처리 중</h1>
        <p class="desc">라이엇 로그인 정보와 디스코드 계정을 매핑하고 있습니다. 잠시만 기다려 주세요...</p>
      </div>

      <div id="view-success" style="display: none;">
        <div class="status-icon icon-success">
          <svg viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h1>로그인 완료!</h1>
        <p class="desc" id="success-desc">라이엇 계정이 정상적으로 연결되었습니다.<br>디스코드로 돌아가서 <code>/상점</code> 을 입력해 상점을 확인해 주세요.<br><span id="player-badge" class="playerName"></span></p>
      </div>

      <div id="view-error" style="display: none;">
        <div class="status-icon icon-error">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </div>
        <h1 id="error-title">인증 오류</h1>
        <p class="desc" id="error-desc">로그인 처리 도중 문제가 발생했습니다.</p>
        <div class="error-details" id="error-troubleshoot" style="display: none;">
          <strong>오류 원인 및 해결 방법</strong>
          <span id="troubleshoot-text">설명</span>
        </div>
        <button class="btn" onclick="window.close()">창 닫기</button>
      </div>
    </div>
  </div>

  <script>
    // Elements
    const viewLoading = document.getElementById('view-loading');
    const viewSuccess = document.getElementById('view-success');
    const viewError = document.getElementById('view-error');
    
    const successDesc = document.getElementById('success-desc');
    const playerBadge = document.getElementById('player-badge');
    const errorTitle = document.getElementById('error-title');
    const errorDesc = document.getElementById('error-desc');
    const errorTroubleshoot = document.getElementById('error-troubleshoot');
    const troubleshootText = document.getElementById('troubleshoot-text');
    const card = document.getElementById('card');

    // Show specific view helper
    function showView(viewName) {
      viewLoading.style.display = viewName === 'loading' ? 'block' : 'none';
      viewSuccess.style.display = viewName === 'success' ? 'block' : 'none';
      viewError.style.display = viewName === 'error' ? 'block' : 'none';
    }

    // Show error helper
    function showError(title, message, troubleshoot) {
      document.title = "Valubot - 인증 오류";
      errorTitle.innerText = title;
      errorDesc.innerText = message;
      if (troubleshoot) {
        errorTroubleshoot.style.display = 'block';
        troubleshootText.innerText = troubleshoot;
      } else {
        errorTroubleshoot.style.display = 'none';
      }
      card.style.borderColor = 'var(--primary)';
      showView('error');
    }

    // Extract parameters from URL fragment or query string
    function getParam(name) {
      // 1. Check hash fragment (OAuth implicitly returns tokens in fragment)
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      if (hashParams.get(name)) return hashParams.get(name);
      
      // 2. Check query string
      const queryParams = new URLSearchParams(window.location.search);
      return queryParams.get(name);
    }

    async function processCallback() {
      // Get tokens and state from callback URL
      const accessToken = getParam('access_token');
      const idToken = getParam('id_token');
      const state = getParam('state');
      const errorCode = getParam('error');
      const errorDescription = getParam('error_description');

      // 1. Check for Riot Authorization errors
      if (errorCode) {
        showError(
          '라이엇 로그인 실패',
          `라이엇 서버 로그인 과정에서 에러가 발생했습니다: ${errorDescription || errorCode}`,
          'Riot 계정 로그인 화면에서 사용자가 취소를 눌렀거나, 라이엇 서버의 일시적인 순시 문제일 수 있습니다. 디스코드에서 /로그인을 다시 시도해 주세요.'
        );
        return;
      }

      // 2. Check if state or token is missing
      if (!state) {
        showError(
          '인증 정보 부족 (Missing State)',
          '보안 상태 정보(state)가 누락되어 인증 처리를 계속할 수 없습니다.',
          '디스코드 봇을 통하지 않고 직접 주소창을 통해 접근하는 경우 발생할 수 있습니다. 반드시 디스코드 채널에서 /로그인 버튼을 클릭해 진행해 주세요.'
        );
        return;
      }

      if (!accessToken) {
        showError(
          '로그인 정보 부족 (Missing Tokens)',
          '라이엇 서버로부터 인증 토큰(access_token)을 수신하지 못했습니다.',
          '로그인이 완료되기 전에 페이지를 벗어났거나, 브라우저가 Riot Redirect를 차단했을 수 있습니다. 디스코드에서 /로그인 명령을 다시 실행해 주세요.'
        );
        return;
      }

      // 3. Send tokens to backend bot server
      const backendBaseUrl = window.VALUBOT_BACKEND_URL || 'http://localhost:10000';
      const endpoint = `${backendBaseUrl}/api/auth/riot/callback`;

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            accessToken,
            idToken,
            state
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success!
          document.title = "Valubot - 로그인 완료";
          playerBadge.innerText = data.playerName || '연결 완료';
          card.style.borderColor = 'var(--success)';
          showView('success');
        } else {
          // Server returned validation error
          const errorMsg = data.error || '알 수 없는 서버 인증 오류입니다.';
          let troubleshootMsg = '인증 토큰이 만료되었거나 올바르지 않은 상태값(state)입니다. 로그인 유효시간(5분)이 초과했을 수 있으니 디스코드에서 /로그인 명령어를 통해 새로이 링크를 받아 실행해 주세요.';
          
          if (response.status === 404) {
            troubleshootMsg = '백엔드 서버에서 콜백 처리 API 경로(/api/auth/riot/callback)를 찾을 수 없습니다. 봇 소스코드가 최신 버전으로 풀(pull)되었고 백엔드가 정상 기동되었는지 확인해 주세요.';
          }
          
          showError('계정 연동 실패', errorMsg, troubleshootMsg);
        }
      } catch (err) {
        // Network/Fetch errors (CORS blocks, Server offline)
        console.error('Connection failure:', err);
        showError(
          '봇 서버 연결 실패 (Network Error)',
          '봇 백엔드 서버에 접속할 수 없었습니다. (서버 응답 없음 또는 CORS 차단)',
          `인증 콜백을 전송할 봇 서버(${backendBaseUrl})가 현재 가동되지 않고 있거나, callback-site/config.js에 설정한 window.VALUBOT_BACKEND_URL 값이 실제 봇의 외부 접속 주소와 다릅니다. 설정 파일을 수정해 주세요.`
        );
      }
    }

    // Run callback processing
    processCallback();
  </script>
</body>
</html>
